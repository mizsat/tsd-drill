<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TSDドリル</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f7;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #66717d;
      --line: #d7dde3;
      --cell: #edf1f5;
      --ghost: #dfe5eb;
      --fixed: #596575;
      --i: #45aaf2;
      --t: #b15cff;
      --j: #4b7bec;
      --l: #ff9f43;
      --o: #fed330;
      --s: #26de81;
      --z: #fc5c65;
      --accent: #0f6d7a;
      --accent-soft: #e6f3f4;
      --ok: #1f8f5f;
      --shadow: 0 10px 24px rgba(32, 42, 54, .07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      padding: 14px clamp(16px, 4vw, 42px);
      border-bottom: 1px solid var(--line);
      border-top: 4px solid var(--accent);
      background: #fff;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      grid-template-columns: repeat(2, 13px);
      grid-template-rows: repeat(2, 13px);
      gap: 3px;
      flex: 0 0 auto;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f9fbfc;
    }

    .brand-mark span {
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, .14);
    }

    .brand-mark span:nth-child(1) { background: var(--t); }
    .brand-mark span:nth-child(2) { background: var(--s); }
    .brand-mark span:nth-child(3) { background: var(--j); }
    .brand-mark span:nth-child(4) { background: var(--o); }

    .brand-copy {
      display: grid;
      gap: 1px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(23px, 3.4vw, 32px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .header-chip {
      flex: 0 0 auto;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px clamp(14px, 3vw, 28px) 36px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(310px, 430px);
      justify-content: center;
      gap: 18px;
    }

    .side-panel {
      display: grid;
      gap: 10px;
      align-self: start;
    }

    .problem-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .problem-count {
      min-width: 104px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      text-align: center;
    }

    .problem-picker {
      display: grid;
      gap: 8px;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .group-tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 6px;
      padding: 6px;
      background: #e9eef1;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .group-tab {
      min-height: 32px;
      padding: 0 8px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }

    .group-tab.active {
      border-color: var(--accent);
      background: #fff;
      color: var(--accent);
      box-shadow: 0 3px 8px rgba(32, 42, 54, .06);
    }

    .picker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .picker-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .picker-progress {
      flex: 0 0 auto;
      color: var(--ok);
    }

    .history-clear {
      min-height: 30px;
      padding: 0 9px;
      border-color: var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }

    .problem-buttons {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 4px;
    }

    .problem-jump {
      min-width: 0;
      min-height: 24px;
      padding: 0;
      border-color: var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .problem-jump.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .problem-jump.solved {
      border-color: #9bd8bb;
      background: #e7f6ef;
      color: var(--ok);
    }

    .problem-jump.solved.active {
      border-color: var(--ok);
      background: var(--ok);
      color: #fff;
    }

    .problem-jump.attempted:not(.solved):not(.active) {
      border-color: #f0cf8c;
      background: #fff8e8;
      color: #8a5a00;
    }


    .card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-top: 3px solid var(--accent);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .badge {
      flex: 0 0 auto;
      min-width: 64px;
      padding: 5px 8px;
      border-radius: 6px;
      background: #e7f2f5;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .meta-box {
      min-height: 56px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfc;
    }

    .label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .mino-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
    }

    .mino {
      display: grid;
      grid-template-columns: repeat(4, 11px);
      grid-template-rows: repeat(4, 11px);
      gap: 2px;
      padding: 3px;
      border-radius: 5px;
      background: #eef2f5;
      border: 1px solid var(--line);
    }

    .mino-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      background: transparent;
    }

    .mino-cell.filled {
      border: 1px solid rgba(0, 0, 0, .14);
    }

    .mino-cell.I { background: var(--i); }
    .mino-cell.T { background: var(--t); }
    .mino-cell.J { background: var(--j); }
    .mino-cell.L { background: var(--l); }
    .mino-cell.O { background: var(--o); }
    .mino-cell.S { background: var(--s); }
    .mino-cell.Z { background: var(--z); }

    .board-wrap {
      display: grid;
      gap: 10px;
    }

    .board-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
      width: min(100%, 318px);
      aspect-ratio: 10 / 8;
      align-self: center;
      padding: 8px;
      border-radius: 8px;
      background: #202a36;
      border: 1px solid #151c25;
    }

    .cell {
      min-width: 0;
      min-height: 0;
      border-radius: 3px;
      background: var(--cell);
      border: 1px solid rgba(255, 255, 255, .24);
    }

    .cell.empty {
      background: #293544;
      border-color: rgba(255, 255, 255, .06);
    }

    .cell.fixed {
      background: var(--fixed);
    }

    .cell.piece-I { background: var(--i); }
    .cell.piece-J { background: var(--j); }
    .cell.piece-L { background: var(--l); }
    .cell.piece-O { background: var(--o); }
    .cell.piece-S { background: var(--s); }
    .cell.piece-Z { background: var(--z); }
    .cell.piece-T { background: var(--t); }

    .cell.ghost {
      opacity: .54;
      outline: 2px solid rgba(255, 255, 255, .82);
      outline-offset: -2px;
    }

    .cell.ghost-bad {
      background: #b32635;
      opacity: .55;
      outline: 2px solid rgba(255, 255, 255, .82);
      outline-offset: -2px;
    }

    .solve {
      display: grid;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .tool-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .tool-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 5px 8px;
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .tool-button.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .tool-button .mino {
      grid-template-columns: repeat(4, 8px);
      grid-template-rows: repeat(4, 8px);
      gap: 1px;
      padding: 2px;
      background: rgba(255, 255, 255, .55);
    }

    .tool-button .mino-cell {
      width: 8px;
      height: 8px;
      border-radius: 1px;
    }

    .turn-chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 9px;
      border-radius: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }

    .key-help {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .key-help span {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfc;
    }

    .touch-controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      width: min(100%, 318px);
      justify-self: center;
    }

    .touch-control {
      min-width: 0;
      min-height: 44px;
      padding: 0;
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
      font-size: 20px;
      line-height: 1;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .touch-control.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .touch-control:active {
      transform: translateY(1px);
    }

    .touch-next {
      width: min(100%, 318px);
      justify-self: center;
    }

    .check-status {
      min-height: 24px;
      padding: 6px 8px;
      border-radius: 6px;
      background: #f3f6f8;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.4;
    }

    .check-status.ok {
      background: #e7f6ef;
      color: var(--ok);
    }

    .check-status.warn {
      background: #fff4dd;
      color: #8a5a00;
    }

    .check-status.bad {
      background: #ffe8ea;
      color: #b32635;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    button {
      min-height: 38px;
      padding: 0 13px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--accent);
      background: #fff;
    }

    button:disabled {
      cursor: default;
      opacity: .42;
    }

    .answer {
      display: none;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .answer.open {
      display: grid;
    }

    .steps {
      margin: 0;
      padding-left: 20px;
      color: #303946;
      line-height: 1.6;
      font-size: 14px;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .status {
      color: var(--ok);
      font-size: 13px;
      font-weight: 800;
    }

    @media (min-width: 760px) {
      .answer-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: minmax(300px, 320px) minmax(360px, 460px);
        align-items: start;
        justify-content: center;
        gap: 16px;
      }

      .side-panel {
        position: sticky;
        top: 14px;
      }

      .problem-nav {
        padding: 10px;
        gap: 8px;
      }

      .problem-nav button {
        min-height: 34px;
        padding: 0 10px;
      }

      .problem-count {
        min-width: 92px;
        font-size: 14px;
      }

      .problem-picker {
        padding: 10px;
      }

      .picker-controls {
        width: 100%;
        justify-content: space-between;
      }

      .problem-buttons {
        max-width: 100%;
      }

      .card {
        padding: 14px;
        gap: 12px;
      }
    }

    @media (max-width: 420px) {
      .meta {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
      }

      .meta-box {
        min-height: 48px;
        padding: 6px;
      }

      .label {
        font-size: 10px;
      }

      .mino-row {
        min-height: 34px;
        gap: 4px;
      }

      .mino {
        grid-template-columns: repeat(4, 8px);
        grid-template-rows: repeat(4, 8px);
        gap: 1px;
        padding: 2px;
      }

      .mino-cell {
        width: 8px;
        height: 8px;
      }

      .problem-buttons {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .problem-jump {
        min-height: 28px;
      }

      .board {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="brand-copy">

          <div class="subtitle">形作り問題集</div>
        </div>
      </div>
      <div class="header-chip" id="header-chip">ライン消去 58問</div>
    </div>
  </header>

  <main>
    <section class="grid" id="problems"></section>
  </main>

    function stableShuffleScore(problem) {
      const key = `${problem.id}-${problem.current?.[0] || ""}${problem.next?.[0] || ""}${problem.next2?.[0] || ""}`;
      let hash = 0;
      for (let i = 0; i < key.length; i += 1) {
        hash = (hash * 31 + key.charCodeAt(i)) % 1000003;
      }
      return hash;
    }

    function shuffledCopy(items) {
      return items
        .slice()
        .sort((a, b) => stableShuffleScore(a) - stableShuffleScore(b) || a.id - b.id);
    }

    function saveSolvedProblems() {
      try {
        localStorage.setItem(solvedStorageKey(), JSON.stringify([...solvedProblems]));
      } catch {
        // 保存できない環境では、ページを開いている間だけ履歴を表示します。
      }
    }

    function markSolved(problemId) {
      solvedProblems.add(Number(problemId));
      saveSolvedProblems();
    }

    function unmarkSolved(problemId) {
      solvedProblems.delete(Number(problemId));
      saveSolvedProblems();
    }

    function clearSolvedHistory() {
      solvedProblems.clear();
      Object.keys(userStates).forEach((key) => {
        delete userStates[key];
      });
      try {
        localStorage.removeItem(solvedStorageKey());
      } catch {
        // 保存先が使えない場合も、画面上の履歴は消します。
      }
      render();
    }

    function switchProblemSet(problemSetId) {
      if (!problemSets[problemSetId] || problemSetId === currentProblemSetId) return;
      currentProblemSetId = problemSetId;
      problems = currentProblemSet().problems;
      currentProblemIndex = 0;
      solvedProblems = loadSolvedProblems();
      Object.keys(userStates).forEach((key) => {
        delete userStates[key];
      });
      render();
    }

    function pieceSequence(problem) {
      return [problem.current?.[0], problem.next?.[0], problem.next2?.[0]].filter(Boolean);
    }

    function shapeWidth(piece, rotation = 0) {
      const shapes = tetrominoCells[piece];
      const rel = shapes[rotation % shapes.length];
      const bounds = shapeBounds(rel);
      return bounds.maxX - bounds.minX + 1;
    }

    function shapeBounds(rel) {
      return {
        minX: Math.min(...rel.map(([x]) => x)),
        maxX: Math.max(...rel.map(([x]) => x)),
        minY: Math.min(...rel.map(([, y]) => y)),
        maxY: Math.max(...rel.map(([, y]) => y))
      };
    }

    function clampOriginX(rel, ox) {
      const bounds = shapeBounds(rel);
      return Math.max(-bounds.minX, Math.min(9 - bounds.maxX, ox));
    }

    function centeredHover(piece, rotation = 0) {
      const rel = tetrominoCells[piece][rotation % tetrominoCells[piece].length];
      const bounds = shapeBounds(rel);
      const width = bounds.maxX - bounds.minX + 1;
      return { x: Math.floor((10 - width) / 2) - bounds.minX, y: 0 };
    }

    function minoHtml(piece) {
      return `<div class="mino" aria-label="${piece}ミノ">${minoShapes[piece].map((row) =>
        row.split("").map((ch) => {
          const filled = ch === piece ? " filled" : "";
          const klass = ch === piece ? ` ${piece}` : "";
          return `<span class="mino-cell${filled}${klass}"></span>`;
        }).join("")
      ).join("")}</div>`;
    }

    function cellClass(ch, rowFromTop, col) {
      if (ch === ".") return "cell empty";
      if (ch === "#") return "cell fixed";
      return `cell piece-${ch}`;
    }

    function boardHtml(rows) {
      return `<div class="board" aria-label="盤面">${rows.map((row, y) =>
        row.split("").map((ch, x) => `<span class="${cellClass(ch, y, x)}"></span>`).join("")
      ).join("")}</div>`;
    }

    function normalizeCells(cells) {
      const minX = Math.min(...cells.map(([x]) => x));
      const minY = Math.min(...cells.map(([, y]) => y));
      return cells
        .map(([x, y]) => [x - minX, y - minY])
        .sort((a, b) => a[1] - b[1] || a[0] - b[0])
        .map((cell) => cell.join(","))
        .join(";");
    }

    function ensureUserState(problem) {
      if (!userStates[problem.id]) {
        const rotation = Object.fromEntries(pieceSequence(problem).map((piece) => [piece, 0]));
        userStates[problem.id] = {
          rows: problem.start.slice(),
          tool: problem.current[0],
          rotation,
          step: 0,
          hover: centeredHover(problem.current[0], rotation[problem.current[0]]),
          lockedPlacement: null,
          done: false,
          message: "未判定",
          tone: ""
        };
      }
      return userStates[problem.id];
    }

    function activeShape(problem) {
      const state = ensureUserState(problem);
      if (state.tool === ".") return [];
      const shapes = tetrominoCells[state.tool];
      return shapes[state.rotation[state.tool] % shapes.length];
    }

    function activeShapeWidth(problem) {
      const rel = activeShape(problem);
      if (!rel.length) return 1;
      const bounds = shapeBounds(rel);
      return bounds.maxX - bounds.minX + 1;
    }

    function currentProblem() {
      return problems[currentProblemIndex];
    }

    function ensureHover(problem) {
      const state = ensureUserState(problem);
      if (!state.hover) {
        state.hover = centeredHover(state.tool, state.rotation[state.tool]);
      }
      return state.hover;
    }

    function moveGhost(problem, dx) {
      const state = ensureUserState(problem);
      if (state.done) return;
      state.lockedPlacement = null;
      ensureHover(problem);
      const rel = activeShape(problem);
      const baseRows = rowsWithoutPiece(state.rows, state.tool);
      const nextX = clampOriginX(rel, state.hover.x + dx);
      if (canPlaceRows(baseRows, rel, nextX, state.hover.y)) {
        state.hover.x = nextX;
        state.message = "未判定";
        state.tone = "";
      }
      updateUserArea(problem.id);
    }

    function softDrop(problem) {
      const state = ensureUserState(problem);
      if (state.done) return;
      state.lockedPlacement = null;
      ensureHover(problem);
      const rel = activeShape(problem);
      const baseRows = rowsWithoutPiece(state.rows, state.tool);
      if (canPlaceRows(baseRows, rel, state.hover.x, state.hover.y + 1)) {
        state.hover.y += 1;
        state.message = "未判定";
        state.tone = "";
      } else {
        state.message = "これ以上下がれません";
        state.tone = "warn";
      }
      updateUserArea(problem.id);
    }

    function rotateActive(problem, delta) {
      const state = ensureUserState(problem);
      if (state.done) return;
      if (state.tool === ".") return;
      const count = tetrominoCells[state.tool].length;
      if (count === 1) return;

      const from = state.rotation[state.tool] % count;
      const to = (from + delta + count) % count;
      const current = currentPlacement(problem);
      if (!current || !current.valid) return;

      const baseRows = rowsWithoutPiece(state.rows, state.tool);
      const rel = tetrominoCells[state.tool][to];
      const kickKey = `${from}>${to}`;
      const kicks = state.tool === "I" ? iKicks[kickKey] : normalKicks[kickKey];

      for (const [kx, ky] of kicks || [[0, 0]]) {
        const ox = current.ox + kx;
        const oy = current.oy + ky;
        if (canPlaceRows(baseRows, rel, ox, oy)) {
          state.rotation[state.tool] = to;
          state.hover = { x: ox, y: oy };
          state.lockedPlacement = null;
          state.message = "未判定";
          state.tone = "";
          updateUserArea(problem.id);
          return;
        }
      }

      state.message = "回転できません";
      state.tone = "warn";
      updateUserArea(problem.id);
    }

    function rowsWithoutPiece(rows, piece) {
      if (piece === ".") return rows.slice();
      return rows.map((row) => row.replaceAll(piece, "."));
    }

    function dropPlacement(rows, rel, ox) {
      const maxY = Math.max(...rel.map(([, y]) => y));
      let best = null;
      for (let oy = 0; oy <= 7 - maxY; oy += 1) {
        if (canPlaceRows(rows, rel, ox, oy) && pathClear(rows, rel, ox, oy)) {
          best = { rel, ox, oy, valid: true };
        }
      }
      return best || { rel, ox, oy: 0, valid: false };
    }

    function dropPlacementFrom(rows, rel, ox, oy) {
      if (!canPlaceRows(rows, rel, ox, oy)) return { rel, ox, oy, valid: false };
      let landingY = oy;
      while (canPlaceRows(rows, rel, ox, landingY + 1)) landingY += 1;
      return { rel, ox, oy: landingY, valid: true };
    }

    function currentPlacement(problem) {
      const state = ensureUserState(problem);
      if (state.done || !state.hover || state.tool === ".") return null;

      const rel = activeShape(problem);
      const baseRows = rowsWithoutPiece(state.rows, state.tool);
      return { rel, ox: state.hover.x, oy: state.hover.y, valid: canPlaceRows(baseRows, rel, state.hover.x, state.hover.y) };
    }

    function droppedPlacement(problem) {
      const current = currentPlacement(problem);
      if (!current || !current.valid) return current;
      const state = ensureUserState(problem);
      const baseRows = rowsWithoutPiece(state.rows, state.tool);
      return dropPlacementFrom(baseRows, current.rel, current.ox, current.oy);
    }

    function ghostInfo(problem) {
      const state = ensureUserState(problem);
      if (state.done || !state.hover || state.tool === ".") return null;

      const placement = droppedPlacement(problem);
      const cells = placement.rel.map(([dx, dy]) => [placement.ox + dx, placement.oy + dy]);
      return { cells, valid: placement.valid, piece: state.tool };
    }

    function cellClassWithGhost(baseClass, ghost, x, y) {
      if (!ghost) return baseClass;
      const isGhostCell = ghost.cells.some(([gx, gy]) => gx === x && gy === y);
      if (!isGhostCell) return baseClass;
      const pieceClass = `piece-${ghost.piece}`;
      return `${baseClass} ${pieceClass} ${ghost.valid ? "ghost" : "ghost-bad"}`;
    }

    function userCellsHtml(problem) {
      const state = ensureUserState(problem);
      const ghost = ghostInfo(problem);
      return state.rows.map((row, y) =>
        row.split("").map((ch, x) => {
          return `<span class="${cellClassWithGhost(cellClass(ch, y, x), ghost, x, y)}"></span>`;
        }).join("")
      ).join("");
    }

    function userBoardHtml(problem) {
      return `<div class="board editable-board" data-user-board="${problem.id}" aria-label="回答盤面">${userCellsHtml(problem)}</div>`;
    }

    function turnChipHtml(problem) {
      const state = ensureUserState(problem);
      const label = state.tool === "." ? "消す" : `${state.tool}ミノ`;
      const shapeCount = state.tool === "." ? 1 : tetrominoCells[state.tool].length;
      const rotation = state.tool === "." ? "" : ` / 向き ${state.rotation[state.tool] % shapeCount + 1}`;
      return `<span class="turn-chip" id="turn-${problem.id}">${label}${rotation}</span>`;
    }

    function statusHtml(problem) {
      const state = ensureUserState(problem);
      const tone = state.tone ? ` ${state.tone}` : "";
      return `<div class="check-status${tone}" id="check-${problem.id}">${state.message}</div>`;
    }

    function sameRows(a, b) {
      return a.join("/") === b.join("/");
    }

    function rowsFromBottom(rows) {
      return rows.slice().reverse().map((row) => row.split(""));
    }

    function validTsdAt(rows, center) {
      const board = rowsFromBottom(rows);
      const holes = [[center, 0], [center - 1, 1], [center, 1], [center + 1, 1]];
      if (center < 1 || center > 8) return false;
      if (!holes.every(([x, y]) => board[y]?.[x] === ".")) return false;

      const afterT = board.map((row) => row.slice());
      holes.forEach(([x, y]) => { afterT[y][x] = "T"; });
      if (!afterT[0].every((cell) => cell !== ".") || !afterT[1].every((cell) => cell !== ".")) return false;
      if (!(board[2][center - 1] !== "." || board[2][center + 1] !== ".")) return false;

      const leftEntry = board[2][center - 1] === "." && board[2][center] === "." && board[3][center - 1] === "." && board[3][center] === ".";
      const rightEntry = board[2][center] === "." && board[2][center + 1] === "." && board[3][center] === "." && board[3][center + 1] === ".";
      return leftEntry || rightEntry;
    }

    function tsdCenters(rows) {
      return Array.from({ length: 8 }, (_, index) => index + 1).filter((center) => validTsdAt(rows, center));
    }

    function validCaveTsdAt(rows, center, bottomY) {
      if (center < 1 || center > 8 || bottomY < 3 || bottomY > 7) return false;

      const holes = [[center, bottomY], [center - 1, bottomY - 1], [center, bottomY - 1], [center + 1, bottomY - 1]];
      if (!holes.every(([x, y]) => rows[y]?.[x] === ".")) return false;

      const afterT = rows.map((row) => row.split(""));
      holes.forEach(([x, y]) => { afterT[y][x] = "T"; });
      if (!afterT[bottomY].every((cell) => cell !== ".") || !afterT[bottomY - 1].every((cell) => cell !== ".")) return false;

      const hasRoof = rows[bottomY - 2][center - 1] !== "." || rows[bottomY - 2][center + 1] !== ".";
      const leftEntry = [bottomY - 3, bottomY - 2].every((y) => rows[y][center - 1] === "." && rows[y][center] === ".");
      const rightEntry = [bottomY - 3, bottomY - 2].every((y) => rows[y][center] === "." && rows[y][center + 1] === ".");
      return hasRoof && (leftEntry || rightEntry);
    }

    function caveTsdCenters(rows) {
      const found = [];
      for (let bottomY = 3; bottomY < 8; bottomY += 1) {
        for (let center = 1; center < 9; center += 1) {
          if (validCaveTsdAt(rows, center, bottomY)) found.push({ center, bottomY });
        }
      }
      return found;
    }

    function rowsAfterCaveTsd(rows, cave) {
      const nextRows = rows.map((row) => row.split(""));
      [[cave.center, cave.bottomY], [cave.center - 1, cave.bottomY - 1], [cave.center, cave.bottomY - 1], [cave.center + 1, cave.bottomY - 1]]
        .forEach(([x, y]) => { nextRows[y][x] = "T"; });

      const kept = nextRows
        .map((row) => row.join(""))
        .filter((_, y) => y !== cave.bottomY && y !== cave.bottomY - 1);
      while (kept.length < 8) kept.unshift("..........");
      return kept;
    }

    function stableAfterClear(rows) {
      for (let y = 0; y < rows.length - 1; y += 1) {
        for (let x = 0; x < 10; x += 1) {
          if (rows[y][x] !== "." && rows[y + 1][x] === ".") return false;
        }
      }
      return true;
    }

    function hasUnsupportedBlockInClearedRows(rows, cave) {
      for (const y of [cave.bottomY - 1, cave.bottomY]) {
        for (let x = 0; x < 10; x += 1) {
          if (rows[y][x] !== "." && y + 1 < rows.length && rows[y + 1][x] === ".") return true;
        }
      }
      return false;
    }

    function noBadFloat(rows, center) {
      const board = rowsFromBottom(rows);
      const allowedRoof = new Set([`${center - 1},2`, `${center + 1},2`]);
      for (let y = 1; y < board.length; y += 1) {
        for (let x = 0; x < 10; x += 1) {
          if (board[y][x] !== "." && board[y - 1][x] === "." && !allowedRoof.has(`${x},${y}`)) return false;
        }
      }
      return true;
    }

    function pieceCells(rows, piece) {
      const cells = [];
      rows.forEach((row, y) => {
        row.split("").forEach((ch, x) => {
          if (ch === piece) cells.push([x, y]);
        });
      });
      return cells;
    }

    function placementFromCells(cells) {
      const minX = Math.min(...cells.map(([x]) => x));
      const minY = Math.min(...cells.map(([, y]) => y));
      return {
        ox: minX,
        oy: minY,
        rel: cells.map(([x, y]) => [x - minX, y - minY])
      };
    }

    function canPlaceRows(rows, rel, ox, oy) {
      return rel.every(([dx, dy]) => {
        const x = ox + dx;
        const y = oy + dy;
        return x >= 0 && x < 10 && y >= 0 && y < 8 && rows[y][x] === ".";
      });
    }

    function pathClear(rows, rel, ox, oy) {
      const cols = [...new Set(rel.map(([dx]) => ox + dx))];
      return cols.every((x) => {
        const maxY = Math.max(...rel.filter(([dx]) => ox + dx === x).map(([, dy]) => oy + dy));
        for (let y = 0; y <= maxY; y += 1) {
          if (rows[y][x] !== ".") return false;
        }
        return true;
      });
    }

    function placeRows(rows, piece, rel, ox, oy) {
      const nextRows = rows.map((row) => row.split(""));
      rel.forEach(([dx, dy]) => { nextRows[oy + dy][ox + dx] = piece; });
      return nextRows.map((row) => row.join(""));
    }

    function sequenceReachable(problem, rows) {
      let currentRows = problem.start.slice();
      for (const piece of pieceSequence(problem)) {
        const cells = pieceCells(rows, piece);
        const placement = placementFromCells(cells);
        if (!canPlaceRows(currentRows, placement.rel, placement.ox, placement.oy)) return false;
        if (!pathClear(currentRows, placement.rel, placement.ox, placement.oy)) return false;
        currentRows = placeRows(currentRows, piece, placement.rel, placement.ox, placement.oy);
      }
      return sameRows(currentRows, rows);
    }

    function validateTwoMinoBoard(problem, rows) {
      if (problem.exactSetup) {
        const caves = caveTsdCenters(rows);
        if (!caves.length) return { tone: "bad", message: "TSDが打てるケイブ形になっていません" };
        if (problem.requireBad && !caves.some((cave) => hasUnsupportedBlockInClearedRows(rows, cave))) {
          return { tone: "bad", message: "消える2段に悪い浮きブロックがありません" };
        }
        if (!caves.some((cave) => stableAfterClear(rowsAfterCaveTsd(rows, cave)))) return { tone: "bad", message: "2ライン消去後の地形が不安定です" };
        if (sameRows(rows, problem.answer)) return { tone: "ok", message: "正解です（模範解と一致）" };
        return { tone: "ok", message: "正解です（きれいな別解）" };
      }

      const pieces = pieceSequence(problem);

      for (const piece of pieces) {
        const cells = pieceCells(rows, piece);
        if (cells.length !== 4) {
          return { tone: "warn", message: `${piece}ミノが${cells.length}マスです` };
        }
        if (!shapeKeys[piece].has(normalizeCells(cells))) {
          return { tone: "bad", message: `${piece}ミノの形が違います` };
        }
      }

      if (problem.kind === "cave") {
        const caves = caveTsdCenters(rows);
        if (!caves.length) return { tone: "bad", message: "TSDが打てるケイブ形になっていません" };
        if (problem.requireBad && !caves.some((cave) => hasUnsupportedBlockInClearedRows(rows, cave))) return { tone: "bad", message: "消える2段に悪い浮きブロックがありません" };
        if (!caves.some((cave) => stableAfterClear(rowsAfterCaveTsd(rows, cave)))) return { tone: "bad", message: "2ライン消去後の地形が不安定です" };
        if (sameRows(rows, problem.answer)) return { tone: "ok", message: "正解です（模範解と一致）" };
        return { tone: "ok", message: "正解です（きれいな別解）" };
      }

      const centers = tsdCenters(rows);
      if (!centers.length) return { tone: "bad", message: "まだTSD待ちになっていません" };
      if (!centers.some((center) => noBadFloat(rows, center))) return { tone: "bad", message: "浮いているブロックがあります" };
      if (!sequenceReachable(problem, rows)) return { tone: "warn", message: "形は近いですが、上から置けない配置です" };
      if (sameRows(rows, problem.answer)) return { tone: "ok", message: "正解です（模範解と一致）" };
      return { tone: "ok", message: "正解です（別解の可能性あり）" };
    }

    function fullLineIndexes(rows) {
      return rows
        .map((row, index) => row.split("").every((cell) => cell !== ".") ? index : -1)
        .filter((index) => index >= 0);
    }

    function clearLinesAt(rows, lines) {
      const clearSet = new Set(lines);
      const kept = rows.filter((_, index) => !clearSet.has(index));
      while (kept.length < 8) kept.unshift("..........");
      return kept;
    }

    function clearTouchedLines(rows, cells) {
      const touched = [...new Set(cells.map(([, y]) => y))];
      const lines = touched.filter((line) => rows[line].split("").every((cell) => cell !== "."));
      return {
        rows: lines.length ? clearLinesAt(rows, lines) : rows,
        count: lines.length
      };
    }

    function validateTsdFinish(problem, rowsWithT) {
      const beforeT = rowsWithoutPiece(rowsWithT, "T");
      const setup = validateTwoMinoBoard(problem, beforeT);
      if (setup.tone !== "ok") return setup;

      const tCells = pieceCells(rowsWithT, "T");
      if (tCells.length !== 4) return { tone: "warn", message: `Tミノが${tCells.length}マスです` };
      if (!shapeKeys.T.has(normalizeCells(tCells))) return { tone: "bad", message: "Tミノの形が違います" };

      const lines = fullLineIndexes(rowsWithT).filter((line) => rowsWithT[line].includes("T"));
      if (lines.length !== 2) return { tone: "bad", message: "TSDで2ライン消えていません" };

      return { tone: "ok", message: "正解です（TSD完了）", rows: clearLinesAt(rowsWithT, lines) };
    }

    function validateUserAnswer(problem) {
      const state = ensureUserState(problem);
      return validateTwoMinoBoard(problem, state.rows);
    }

    function updateUserArea(problemId) {
      const problem = problems.find((item) => item.id === Number(problemId));
      const board = document.querySelector(`[data-user-board="${problemId}"]`);
      if (board) board.innerHTML = userCellsHtml(problem);

      const turn = document.getElementById(`turn-${problemId}`);
      if (turn) turn.outerHTML = turnChipHtml(problem);

      const status = document.getElementById(`check-${problemId}`);
      if (status) {
        const state = ensureUserState(problem);
        status.className = `check-status${state.tone ? ` ${state.tone}` : ""}`;
        status.textContent = state.message;
      }

      updateProblemSelector();
    }

    function selectNextPiece(problem) {
      const state = ensureUserState(problem);
      const sequence = pieceSequence(problem);
      const nextStep = Math.min(state.step + 1, sequence.length - 1);
      state.step = nextStep;
      state.tool = sequence[nextStep];
      state.hover = centeredHover(state.tool, state.rotation[state.tool]);
      state.lockedPlacement = null;
    }

    function commitGhost(problem) {
      const state = ensureUserState(problem);
      if (state.done) return false;
      if (state.tool === "." || !state.hover) return false;

      const sequence = pieceSequence(problem);
      const isLastPiece = state.step === sequence.length - 1;
      const placedPiece = state.tool;
      const placement = droppedPlacement(problem);
      const rel = placement.rel;
      const baseRows = rowsWithoutPiece(state.rows, state.tool);
      if (!placement.valid) {
        state.message = "そこには置けません";
        state.tone = "warn";
        return false;
      }

      state.rows = placeRows(baseRows, state.tool, rel, placement.ox, placement.oy);
      state.lockedPlacement = null;
      state.message = "未判定";
      state.tone = "";
      const placedCells = rel.map(([dx, dy]) => [placement.ox + dx, placement.oy + dy]);
      const cleared = clearTouchedLines(state.rows, placedCells);
      state.rows = cleared.rows;

      if (isLastPiece) {
        const result = validateUserAnswer(problem);
        state.message = result.message;
        state.tone = result.tone;
        if (result.tone === "ok") markSolved(problem.id);
        state.done = true;
        state.hover = null;
      } else {
        if (cleared.count) {
          state.message = `${cleared.count}ライン消去`;
        }
        selectNextPiece(problem);
      }
      return true;
    }

    function problemNavHtml() {
      const atFirst = currentProblemIndex === 0 ? " disabled" : "";
      const atLast = currentProblemIndex === problems.length - 1 ? " disabled" : "";
      return `
        <div class="problem-nav">
          <button type="button" class="secondary" data-prev-problem${atFirst}>前へ</button>
          <div class="problem-count">第${currentProblemIndex + 1}問 / ${problems.length}</div>
          <button type="button" class="secondary" data-next-problem${atLast}>次へ</button>
        </div>
      `;
    }

    function problemSetTabsHtml() {
      return `
        <div class="group-tabs" aria-label="問題グループ">
          ${Object.entries(problemSets).filter(([, set]) => !set.hidden).map(([id, set]) => `
            <button type="button" class="group-tab${id === currentProblemSetId ? " active" : ""}" data-select-group="${id}">${set.label}</button>
          `).join("")}
        </div>
      `;
    }

    function problemProgressHtml() {
      return `<span class="picker-progress" id="picker-progress">正解 ${solvedProblems.size} / ${problems.length}</span>`;
    }

    function problemButtonClass(problem, index) {
      const state = userStates[problem.id];
      const classes = ["problem-jump"];
      if (index === currentProblemIndex) classes.push("active");
      if (solvedProblems.has(problem.id)) classes.push("solved");
      if (state && (state.step > 0 || state.done || state.message !== "未判定")) classes.push("attempted");
      return classes.join(" ");
    }

    function touchControlsHtml() {
      const controls = [
        ["rotate-left", "↺", "左回転"],
        ["move-left", "←", "左へ移動"],
        ["hard-drop", "⤓", "ハードドロップ", "primary"],
        ["move-right", "→", "右へ移動"],
        ["rotate-right", "↻", "右回転"]
      ];
      return `
        <div class="touch-controls" aria-label="スマートフォン用操作ボタン">
          ${controls.map(([action, label, ariaLabel, extraClass]) => `
            <button type="button" class="touch-control${extraClass ? ` ${extraClass}` : ""}" data-control="${action}" aria-label="${ariaLabel}">${label}</button>
          `).join("")}
        </div>
      `;
    }

    function problemSelectorHtml() {
      return `
        <div class="problem-picker">
          <div class="picker-head">
            <span>問題選択</span>
            <div class="picker-controls">
              ${problemProgressHtml()}
              <button type="button" class="history-clear" data-clear-history>履歴消去</button>
            </div>
          </div>
          <div class="problem-buttons" id="problem-buttons">
            ${problems.map((problem, index) => `
              <button type="button" class="${problemButtonClass(problem, index)}" data-select-problem="${problem.id}" aria-label="第${problem.displayId || problem.id}問${solvedProblems.has(problem.id) ? " 正解済み" : ""}へ移動">${problem.displayId || problem.id}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function updateProblemSelector() {
      const progress = document.getElementById("picker-progress");
      if (progress) progress.textContent = `正解 ${solvedProblems.size} / ${problems.length}`;

      const buttons = document.getElementById("problem-buttons");
      if (!buttons) return;
      buttons.querySelectorAll("[data-select-problem]").forEach((button) => {
        const problemId = Number(button.dataset.selectProblem);
        const problem = problems.find((item) => item.id === problemId);
        const index = problems.findIndex((item) => item.id === problemId);
        button.className = problemButtonClass(problem, index);
        const displayId = problem.displayId || problem.id;
        button.textContent = displayId;
        button.setAttribute("aria-label", `第${displayId}問${solvedProblems.has(problemId) ? " 正解済み" : ""}へ移動`);
      });
    }

    function problemCardHtml(p) {
      const levelBadge = currentProblemSet().hideLevel ? "" : `<span class="badge">${p.level}</span>`;
      const sequenceLabel = pieceSequence(p).map((_, index) => index === 0 ? "Current" : `Next${index}`).join(" → ");
      const steps = p.steps?.length
        ? p.steps
        : pieceSequence(p).map((piece, index) => `${index === 0 ? "Current" : `Next${index}`}の${piece}ミノを置く`);
      const atLast = currentProblemIndex === problems.length - 1 ? " disabled" : "";
      const answerBoards = p.answerPreClear
        ? [
            { title: ["消去直前", "ラインが消える前"], rows: p.answerPreClear },
            { title: ["完成図", "消去後のTSD待ち"], rows: p.answer }
          ]
        : [
            { title: ["3ミノ後", "T穴を残す"], rows: p.answer }
          ];
      return `
        <article class="card">
          <div class="card-head">
            <h2>${p.title}</h2>
            ${levelBadge}
          </div>
          <div class="meta">
            <div class="meta-box">
              <div class="label">Current</div>
              <div class="mino-row">${p.current.map(minoHtml).join("")}</div>
            </div>
            <div class="meta-box">
              <div class="label">Next1</div>
              <div class="mino-row">${p.next.map(minoHtml).join("")}</div>
            </div>
            ${p.next2?.length ? `<div class="meta-box">
              <div class="label">Next2</div>
              <div class="mino-row">${p.next2.map(minoHtml).join("")}</div>
            </div>` : ""}
          </div>
          <div class="solve">
            <div class="board-title"><span>地形にミノを置く</span><span>${sequenceLabel}</span></div>
            <div class="tool-row">
              ${turnChipHtml(p)}
            </div>
            <div class="key-help">
              <span>← → 移動</span>
              <span>Z / X 回転</span>
              <span>↓ ソフトドロップ</span>
              <span>↑ ハードドロップ</span>
              <span>Space 次の問題</span>
              <span>Esc リセット</span>
            </div>
            ${userBoardHtml(p)}
            ${touchControlsHtml()}
            <button type="button" class="touch-next secondary" data-next-problem${atLast}>次の問題へ</button>
            ${statusHtml(p)}
          </div>
          <div class="actions">
            <button type="button" class="secondary" data-clear="${p.id}">リセット</button>
            <button type="button" data-answer="${p.id}">答えを見る</button>
            <button type="button" class="secondary" data-reset="${p.id}">隠す</button>
          </div>
          <div class="answer" id="answer-${p.id}">
            <div class="status">TSD待ち完成</div>
            <ol class="steps">${steps.map((step) => `<li>${step}</li>`).join("")}</ol>
            <div class="answer-grid">
              ${answerBoards.map((item) => `
                <div class="board-wrap">
                  <div class="board-title"><span>${item.title[0]}</span><span>${item.title[1]}</span></div>
                  ${boardHtml(item.rows)}
                </div>
              `).join("")}
            </div>
          </div>
        </article>
      `;
    }

    function render() {
      const root = document.getElementById("problems");
      const problem = problems[currentProblemIndex];
      const headerChip = document.getElementById("header-chip");
      if (headerChip) headerChip.textContent = `${currentProblemSet().label} ${problems.length}問`;
      root.innerHTML = `
        <aside class="side-panel">
          ${problemSetTabsHtml()}
          ${problemNavHtml()}
          ${problemSelectorHtml()}
        </aside>
        ${problemCardHtml(problem)}
      `;
    }

    function resetProblem(problem) {
      unmarkSolved(problem.id);
      const rotation = Object.fromEntries(pieceSequence(problem).map((piece) => [piece, 0]));
      userStates[problem.id] = {
        rows: problem.start.slice(),
        tool: problem.current[0],
        rotation,
        step: 0,
        hover: centeredHover(problem.current[0], rotation[problem.current[0]]),
        lockedPlacement: null,
        done: false,
        message: "未判定",
        tone: ""
      };
      updateUserArea(problem.id);
      updateProblemSelector();
    }

    document.addEventListener("click", (event) => {
      const answerId = event.target.dataset.answer;
      const resetId = event.target.dataset.reset;
      const clearId = event.target.dataset.clear;
      const prevProblem = event.target.closest("[data-prev-problem]");
      const nextProblem = event.target.closest("[data-next-problem]");
      const selectedProblem = event.target.closest("[data-select-problem]");
      const clearHistory = event.target.closest("[data-clear-history]");
      const selectedGroup = event.target.closest("[data-select-group]");
      const selectedControl = event.target.closest("[data-control]");

      if (selectedControl) {
        const problem = currentProblem();
        const action = selectedControl.dataset.control;
        if (action === "move-left") {
          moveGhost(problem, -1);
        } else if (action === "move-right") {
          moveGhost(problem, 1);
        } else if (action === "hard-drop") {
          ensureHover(problem);
          commitGhost(problem);
          updateUserArea(problem.id);
        } else if (action === "rotate-left") {
          rotateActive(problem, -1);
        } else if (action === "rotate-right") {
          rotateActive(problem, 1);
        }
        return;
      }

      if (selectedGroup) {
        switchProblemSet(selectedGroup.dataset.selectGroup);
        return;
      }

      if (clearHistory) {
        clearSolvedHistory();
        return;
      }

      if (selectedProblem) {
        const nextIndex = problems.findIndex((item) => item.id === Number(selectedProblem.dataset.selectProblem));
        if (nextIndex >= 0) {
          currentProblemIndex = nextIndex;
          render();
        }
        return;
      }

      if (prevProblem && currentProblemIndex > 0) {
        currentProblemIndex -= 1;
        render();
        return;
      }

      if (nextProblem && currentProblemIndex < problems.length - 1) {
        currentProblemIndex += 1;
        render();
        return;
      }

      if (clearId) {
        const problem = problems.find((item) => item.id === Number(clearId));
        resetProblem(problem);
      }

      if (answerId) document.getElementById(`answer-${answerId}`).classList.add("open");
      if (resetId) document.getElementById(`answer-${resetId}`).classList.remove("open");
    });

    document.addEventListener("keydown", (event) => {
      if (event.altKey || event.ctrlKey || event.metaKey) return;

      const problem = currentProblem();
      const state = ensureUserState(problem);
      const key = event.key.toLowerCase();

      if (event.code === "Space") {
        event.preventDefault();
        if (!event.repeat && currentProblemIndex < problems.length - 1) {
          currentProblemIndex += 1;
          render();
        }
      } else if (event.key === "Escape") {
        event.preventDefault();
        if (!event.repeat) resetProblem(problem);
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        moveGhost(problem, -1);
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        moveGhost(problem, 1);
      } else if (event.key === "ArrowDown") {
        event.preventDefault();
        softDrop(problem);
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        ensureHover(problem);
        commitGhost(problem);
        updateUserArea(problem.id);
      } else if (key === "z") {
        event.preventDefault();
        rotateActive(problem, -1);
      } else if (key === "x") {
        event.preventDefault();
        rotateActive(problem, 1);
      }
    });

    render();
  </script>
</body>
</html>
